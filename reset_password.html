<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Contraseña | Nueva Vida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
<section class="login-page">
  <div class="login-card">
    
    <div class="login-logo">
      <img src="{{ url_for('static', filename='Imagenes/logo NV negro.png') }}" alt="Logo Nueva Vida">
    </div>

    <h2>Nueva Contraseña</h2>
    <p>Ingresa tu nueva clave para acceder al sistema.</p>

    <form method="POST" class="login-form">
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="contrasena" placeholder="Nueva contraseña" required>
      </div>
      <button type="submit" class="btn-login-form">
        Guardar
      </button>
    </form>

    <div class="extra-links">
      <a href="{{ url_for('login') }}">Volver al inicio de sesión</a>
    </div>

  </div>
</section>
</body>
</html>
