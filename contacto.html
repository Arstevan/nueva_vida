<form action="{{ url_for('enviar_mensaje') }}" method="POST">
    <input type="text" name="nombre" class="form-control" placeholder="Tu Nombre" required>
    <input type="email" name="email" class="form-control" placeholder="Tu Email" required>
    <input type="text" name="asunto" class="form-control" placeholder="Asunto" required>
    <textarea name="mensaje" class="form-control" rows="5" placeholder="Tu Mensaje" required></textarea>
    <button type="submit" class="btn btn-primary">Enviar Mensaje</button>
</form>
