<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Contraseña | Nueva Vida</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<section class="login-page">
  <div class="login-card">
    <h2>Recuperar acceso</h2>
    <p>Ingresa tu correo para recibir un enlace de recuperación.</p>
    
    <form method="POST" class="login-form">
      <div class="input-group">
        <input type="email" name="email" placeholder="Correo electrónico" required>
      </div>
      <button type="submit" class="btn-login-form">Enviar enlace</button>
    </form>
    
    <div class="extra-links">
      <a href="{{ url_for('login') }}">Volver al inicio de sesión</a>
    </div>
  </div>
</section>
</body>
</html>
