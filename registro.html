
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Vida - Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .form-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; text-align: center; color: #111; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background: #333; }
    p { margin-top: 15px; text-align: center; font-size: 0.9rem; color: #666; }
    a { color: #000; font-weight: 600; text-decoration: none; }
    .alert { padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 0.85rem; }
    .alert-error { background: #fde8e8; color: #e74c3c; }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Crear Cuenta</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-error">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('registro') }}" method="POST">
      <input type="text" name="nombres" placeholder="Nombres" required>
      <input type="text" name="apellidos" placeholder="Apellidos" required>
      <input type="email" name="email" placeholder="Correo Electrónico" required>
      <input type="password" name="contrasena" placeholder="Contraseña" required>
      <button type="submit">Registrarse</button>
    </form>

    <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
  </div>

</body>
</html>
